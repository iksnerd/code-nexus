name: CI

on:
  push:
    branches: [main]
    # Docs-only commits don't affect the test suite — skip the run.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".agents/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".agents/**"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC — runs secret-scan job

# Cancel an in-flight run when a newer commit lands on the same ref, so rapid
# pushes don't pile up redundant runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Docker images are built and published locally via the Makefile (`make publish`).
# CI only runs tests and secret-scan.
#
# main pushes run: test + secret-scan (skipped for docs-only changes)
# PRs run: test only
# Tag pushes run nothing — releases are local-only.
# Add [skip ci] to a commit message to skip a run entirely.

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "27"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix deps.compile
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test --exclude performance --exclude multi_project --exclude nif --exclude file_watcher
        env:
          QDRANT_URL: http://localhost:6333

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
