version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: nexus
    main: .
    binary: nexus
    ldflags:
      - -s -w -X github.com/iksnerd/elixir-nexus/cli/cmd.Version={{ .Tag }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: nexus
    name_template: "nexus_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md

checksum:
  name_template: "nexus_{{ .Tag }}_checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: iksnerd
    name: code-nexus
  name_template: "CLI {{ .Tag }}"
  header: |
    ## CodeNexus CLI {{ .Tag }}

    ### Install

    **macOS (Apple Silicon)**
    ```bash
    curl -L https://github.com/iksnerd/elixir-nexus/releases/download/{{ .Tag }}/nexus_{{ .Tag }}_darwin_arm64.tar.gz | tar xz
    sudo mv nexus /usr/local/bin/
    ```

    **macOS (Intel)**
    ```bash
    curl -L https://github.com/iksnerd/elixir-nexus/releases/download/{{ .Tag }}/nexus_{{ .Tag }}_darwin_amd64.tar.gz | tar xz
    sudo mv nexus /usr/local/bin/
    ```

    **Linux (amd64)**
    ```bash
    curl -L https://github.com/iksnerd/elixir-nexus/releases/download/{{ .Tag }}/nexus_{{ .Tag }}_linux_amd64.tar.gz | tar xz
    sudo mv nexus /usr/local/bin/
    ```
