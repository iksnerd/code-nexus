services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage:z
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nexus

  code_nexus:
    image: iksnerd/code-nexus:latest
    build: .
    container_name: code_nexus
    ports:
      - "4100:4100"
      - "3002:3002"
    environment:
      MIX_ENV: dev
      QDRANT_URL: "http://qdrant:6333"
      MCP_HTTP_PORT: "3002"
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-embeddinggemma:300m}"
      WORKSPACE_HOST: "${WORKSPACE_HOST:-}"
      WORKSPACE_HOST_2: "${WORKSPACE_HOST_2:-}"
      WORKSPACE_HOST_3: "${WORKSPACE_HOST_3:-}"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ${WORKSPACE:-.}:/workspace:ro
      - ${WORKSPACE_2:-.}:/workspace2:ro
      - ${WORKSPACE_3:-.}:/workspace3:ro
    networks:
      - nexus
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4100'"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_storage:

networks:
  nexus:
    driver: bridge
